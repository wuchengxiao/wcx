<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>无限画布白板</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="toolbar">
            <button id="pen" title="画笔">🖌️<span>画笔</span></button>
            <button id="rect" title="矩形">⬜<span>矩形</span></button>
            <button id="circle" title="圆形">⭕<span>圆形</span></button>
            <button id="arrow" title="箭头">➡️<span>箭头</span></button>
            <button id="text" title="文字">T<span>文字</span></button>
            <button id="delete" title="删除">🗑️<span>删除</span></button>
            <button id="clear" title="清空">🧹<span>清空</span></button>
            <button id="undo" title="撤销">↩️<span>撤销</span></button>
            <button id="redo" title="前进">↪️<span>前进</span></button>
            <button id="zoom-in" title="放大">🔍+<span>放大</span></button>
            <button id="zoom-out" title="缩小">🔍-<span>缩小</span></button>
            <input type="color" id="color" value="#000000" title="颜色">
            <input type="number" id="size" value="2" min="1" max="50" title="尺寸">
            <button class="mode-btn active" data-mode="select" onclick="setMode('select')" title="选择模式">👆<span>选择</span></button>
            <button class="mode-btn" data-mode="move" onclick="setMode('move')" title="平移模式">🔄<span>平移</span></button>
        </div>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="selectionFeedback" class="selection-feedback"></div>
        </div>
        <script src="script.js"></script>
        <script src="layer-manager.js"></script>
    </body>
</html>
