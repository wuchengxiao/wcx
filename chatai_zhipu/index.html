<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>响应式聊天室</title>
  <link rel="stylesheet" href="index.css">
  <script src="constants.js"></script>
  <link rel="stylesheet" href="imagePreview.css">
  <script src="imagePreview.js"></script>
  <script src="util.js"></script>
</head>

<body>
  <!-- 登录框（保留原有逻辑） -->
  <div id="login">
    <div class="form-group">
      <label for="token">token:</label>
      <input type="text" id="token" placeholder="31-a1-51-31-01-41">
    </div>
    <button onclick="runTest()">开始</button>
    <div id="loginMsg"></div>
  </div>

  <!-- 聊天应用主容器 -->
  <div class="app-container" id="app-container">
    <!-- 聊天区域 -->
    <main class="chat-area">
      <div class="chat-overlay"></div>

      <header class="chat-header">
        <div class="chat-title-group">
          <span class="chat-name">AI 智能助手</span>
          <span class="chat-status">在线</span>
        </div>
        <button class="logout-btn" onclick="logout()">退出</button>
      </header>

      <div class="messages-container" id="msg-container">
        <div class="message received">
          <img src="https://picsum.photos/seed/ai/100/100" class="msg-avatar">
          <div class="msg-bubble">你好！我是AI智能助手，我可以回答问题、提供信息和帮助你完成各种任务。有什么可以帮助你的吗？</div>
        </div>

        <div class="typing-indicator" id="typing">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <footer class="input-area">
        <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
          <div id="toolsRow" style="display: none; flex-direction: column; gap: 8px;">
            <div id="btnRow" class="btn-row">
              <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap;">
                <input type="checkbox" id="enableWebSearch" style="cursor: pointer;">
                <span style="font-size: 14px; color: #374151;">联网搜索</span>
              </label>
              <select id="searchEngine"
                style="padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; display: block;">
                <option value="search_std">智谱基础版</option>
                <option value="search_pro">智谱高阶版</option>
                <option value="search_pro_sogou">搜狗</option>
                <option value="search_pro_quark">夸克</option>
              </select>
            </div>
          </div>
          <div style="display: flex; gap: 12px; align-items: flex-end;">
            <button id="toggleToolsBtn" class="icon-btn" title="工具"><svg width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="#666" stroke-width="2">
                <path d="M12 5v14M5 12h14" />
              </svg></button>
            <div class="input-wrapper">
              <input type="text" id="msg-input" placeholder="发消息..." autocomplete="off">
            </div>
          </div>
        </div>
        <button class="send-btn" id="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </footer>
    </main>
  </div>
  <script src="requestText.js"></script>
  <script src="requestImage.js"></script>
  <script src="layout.js"></script>
  <script src="login.js"></script>
  <script src="marked.min.js"></script>
  <script src="reasoningManager.js"></script>
  <script src="index.js"></script>
  <script src="roles/role.js"></script>
</body>

</html>
