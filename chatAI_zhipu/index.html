<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WCX CHAT AI</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f5f6fa;
                margin: 0;
                padding: 24px;
            }
            #chat-content {
                display: none;
                max-width: 920px;
                margin: 0 auto;
            }
            .chat-window {
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                height: 70vh;
                min-height: 420px;
            }
            .chat-header {
                padding: 16px 20px;
                background: #1f6feb;
                color: #fff;
                font-weight: 600;
            }
            .chat-messages {
                flex: 1;
                padding: 16px 20px;
                overflow-y: auto;
                background: #f9fafc;
            }
            .chat-message {
                margin-bottom: 12px;
                display: flex;
                flex-direction: column;
            }
            .chat-message.user {
                align-items: flex-end;
            }
            .chat-bubble {
                max-width: 70%;
                padding: 10px 14px;
                border-radius: 12px;
                line-height: 1.5;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .chat-message.user .chat-bubble {
                background: #1f6feb;
                color: #fff;
                border-bottom-right-radius: 4px;
            }
            .chat-message.assistant .chat-bubble {
                background: #fff;
                color: #111827;
                border: 1px solid #e5e7eb;
                border-bottom-left-radius: 4px;
            }
            .search-sources {
                margin-top: 8px;
                padding: 8px 12px;
                background: #f3f4f6;
                border-radius: 6px;
                font-size: 12px;
                color: #6b7280;
            }
            .search-sources a {
                color: #1f6feb;
                text-decoration: none;
                margin-right: 12px;
            }
            .search-sources a:hover {
                text-decoration: underline;
            }
            .chat-input {
                display: flex;
                gap: 12px;
                padding: 14px 16px;
                border-top: 1px solid #e5e7eb;
                background: #fff;
            }
            .chat-input textarea {
                flex: 1;
                resize: none;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                padding: 10px 12px;
                font-size: 14px;
                outline: none;
            }
            .chat-input button {
                padding: 0 18px;
                border: none;
                border-radius: 8px;
                background: #1f6feb;
                color: #fff;
                font-weight: 600;
                cursor: pointer;
            }
            .chat-input button:disabled {
                background: #93c5fd;
                cursor: not-allowed;
            }
            #login {
                max-width: 520px;
                margin: 0 auto 24px;
                background: #fff;
                padding: 16px 20px;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }
            .form-group {
                margin-bottom: 12px;
            }
        </style>
    </head>
    <body>
        <div id="login">
            <div class="form-group">
                <label for="token">token:</label>
                <input type="text" id="token" value="21-F1-51-31-01-41">
            </div>
            <button onclick="runTest()">开始</button>
            <div id="loginMsg" style="color: red;"></div>
        </div>
        <div id="chat-content">
            <div class="chat-window">
                <div class="chat-header">多轮对话</div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input">
                    <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap;">
                                <input type="checkbox" id="enableWebSearch" style="cursor: pointer;">
                                <span style="font-size: 14px; color: #374151;">联网搜索</span>
                            </label>
                            <select id="searchEngine" style="padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; display: none;">
                                <option value="search_std">智谱基础版</option>
                                <option value="search_pro">智谱高阶版</option>
                                <option value="search_pro_sogou">搜狗</option>
                                <option value="search_pro_quark">夸克</option>
                            </select>
                        </div>
                        <textarea id="userInput" rows="2" placeholder="输入你的问题，回车发送，Shift+Enter 换行"></textarea>
                    </div>
                    <button id="sendBtn">发送</button>
                </div>
            </div>
            <div id="apiResult" style="display:none;"></div>
        </div>
        <script src="util.js"></script>
        <script src="constants.js"></script>
        <script src="index.js"></script>
    </body>
</html>
